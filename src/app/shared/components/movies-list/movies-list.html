<div class="overflow-y-auto px-4 md:px-8 pb-8 scroll-smooth h-full">
  <div class="grid grid-cols-[repeat(auto-fill,minmax(200px,1fr))] gap-6" role="list">
    @for (movie of movies(); track movie.id) {      
      <button
        type="button"
        class="relative group w-full aspect-2/3 rounded-lg overflow-hidden cursor-pointer bg-[#202024] text-left focus:outline-none focus:ring-2 focus:ring-purple-600 focus:ring-offset-2 focus:ring-offset-[#121214] transition-all"
        role="listitem"
        [routerLink]="['/details', movie.id]"
      >
        <img
          [src]="BASE_PATH + movie.caminhoImagem"
          [alt]="'Cartaz' + movie.titulo"
          aria-hidden="true"
          class="w-full h-full object-cover group-hover:scale-110 transition duration-500"
        />
        <div
          class="absolute inset-0 bg-linear-to-t from-black/90 via-black/40 to-transparent flex flex-col justify-end p-4"
        >
          <span
            class="absolute top-2 right-2 bg-black/60 backdrop-blur-sm px-2 py-1 rounded text-xs font-bold text-[#FACC15] flex items-center gap-1"
            [aria-label]="'Avaliação: ' + movie.mediaVotos + ' estrelas'"
          >
            <span aria-hidden="true">★</span> {{ movie.mediaVotos | number: '1.0-1' : 'pt-BR' }}
          </span>
          <h3 class="font-bold text-lg leading-tight mb-1 text-white">{{ movie.titulo }}</h3>
          <span class="text-xs text-gray-300 font-medium">{{ movie.genero }} • {{ movie.anoLancamento }}</span>
        </div>
      </button>
    }

  </div>
</div>
